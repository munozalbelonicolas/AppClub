name: jorge_newbery_app
description: "App oficial del club ASOC. DEPORTIVA INF. Y JUV. JORGE NEWBERY"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # UI & Design
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  table_calendar: ^3.1.3
  flutter_animate: ^4.5.2
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.2.0+3

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  firebase_core: ^4.10.0
  cloud_firestore: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

